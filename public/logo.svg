<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background Circle -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle with Gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" filter="url(#shadow)"/>
  
  <!-- Motion Lines (Speed Effect) -->
  <line x1="80" y1="180" x2="140" y2="180" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
  <line x1="60" y1="220" x2="130" y2="220" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <line x1="70" y1="260" x2="150" y2="260" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="300" x2="140" y2="300" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
  <line x1="60" y1="340" x2="120" y2="340" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Letter N -->
  <path d="M 180 160 L 180 360 L 210 360 L 210 220 L 290 360 L 320 360 L 320 160 L 290 160 L 290 300 L 210 160 Z" 
        fill="white" 
        stroke="white" 
        stroke-width="4"
        stroke-linejoin="round"/>
  
  <!-- Letter X -->
  <path d="M 350 160 L 410 260 L 350 360 L 385 360 L 430 280 L 475 360 L 510 360 L 450 260 L 510 160 L 475 160 L 430 240 L 385 160 Z" 
        fill="white" 
        stroke="white" 
        stroke-width="4"
        stroke-linejoin="round"/>
  
  <!-- Forward Arrow (Dynamic Effect) -->
  <path d="M 470 240 L 490 260 L 470 280" 
        stroke="white" 
        stroke-width="14" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"
        opacity="0.8"/>
</svg>
